title: XBook-CN
author: Modified from dfolio/quarto-ieee
version: 1.0.0
quarto-required: ">=1.3.0"
contributes:
  formats:
    common:
      number-sections: true
      filters:
        - latex-environment
      cite-method: natbib
      biblio-style: plainnat-doi
      biblio-title: "参考文献"
      execute:
        echo: false
        warning: false
        freeze: true
    pdf:
      pdf-engine: xelatex
      keep-tex: true
      toc: true
      toc-depth: 2
      classoption: oneside
      top-level-division: chapter
      df-print: kable
      latex-auto-install: true
      fontsize: 11pt
      geometry: "left=1in,right=1in,top=1in,bottom=1in"
      template-partials:
        - partials/doc-class.tex
        - partials/title.tex
        - partials/author.tex
        - partials/affiliation.tex
        - partials/before-body.tex
        - partials/before-bib.tex
        - partials/after-body.tex
      format-resources:
        - orcidlink.sty
        - plainnat-doi.bst
      include-in-header:
        - partials/preamble.tex
        - partials/theorem-boxes.tex
